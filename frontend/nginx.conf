server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Inject API URL from environment variable
    location = /config.js {
        default_type application/javascript;
        return 200 'window.API_BASE = "${API_BASE_URL}"';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
